<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Personas</title>

    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f4f4f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .formulario { 
            background: white; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 420px; 
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea, button { 
            width: 100%; 
            margin-bottom: 15px; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
        }

        button:hover { 
            background: #0056b3; 
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .mensaje {
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="formulario">
    <h2>Nuevo Registro</h2>

    <input type="text" id="nombre" placeholder="Nombre Completo" required>
    <input type="text" id="dni" placeholder="DNI" required>
    <textarea id="observaciones" placeholder="Observaciones" rows="4"></textarea>

    <button id="btn" onclick="enviarDatos()">Guardar Registro</button>

    <div class="mensaje" id="mensaje"></div>
</div>

<script>
    // 🔴 IMPORTANTE: PEGAR URL DE TU WEB APP DE APPS SCRIPT
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/TU_ID_DE_WEB_APP/exec";

    function enviarDatos() {
        const btn = document.getElementById("btn");
        const mensaje = document.getElementById("mensaje");

        btn.innerText = "Guardando...";
        btn.disabled = true;
        mensaje.innerText = "";

        const datos = {
            nombre: document.getElementById("nombre").value,
            dni: document.getElementById("dni").value,
            observaciones: document.getElementById("observaciones").value
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(datos)
        })
        .then(response => response.text())
        .then(() => {
            mensaje.innerText = "✔ Registro guardado correctamente";
            mensaje.style.color = "green";

            document.getElementById("nombre").value = "";
            document.getElementById("dni").value = "";
            document.getElementById("observaciones").value = "";
        })
        .catch(() => {
            mensaje.innerText = "✖ Error al guardar el registro";
            mensaje.style.color = "red";
        })
        .finally(() => {
            btn.innerText = "Guardar Registro";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
